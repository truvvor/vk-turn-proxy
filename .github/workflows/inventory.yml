name: Inventory
# Runs on the self-hosted runner and writes a read-only snapshot of the host
# (wireguard / xray presence and ports, listening UDP/TCP, runner user, sudo
# capabilities, public IP, bootstrap dry-run) into _inventory/latest.md and
# commits it back to the branch so the result is readable from the repo.

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  inventory:
    name: Host inventory
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Collect inventory into _inventory/latest.md
        shell: bash
        run: |
          set +e
          mkdir -p _inventory
          OUT=_inventory/latest.md
          : > "$OUT"

          {
            echo "## Inventory ($(hostname), $(date -u +%FT%TZ))"
            echo ""
            echo "### Runner user"
            echo '```'
            id
            echo "Runner.Listener pid:  $(pgrep -f Runner.Listener | head -1)"
            echo '```'

            echo "### Listening UDP sockets"
            echo '```'
            ss -uln 2>&1
            echo '```'

            echo "### Listening TCP sockets (top 30)"
            echo '```'
            ss -tln 2>&1 | head -30
            echo '```'

            echo "### WireGuard"
            if ls /etc/wireguard/ >/dev/null 2>&1; then
              echo "/etc/wireguard contents:"
              echo '```'
              ls -la /etc/wireguard/ 2>&1
              echo '```'
            else
              echo "/etc/wireguard not readable (or missing) without sudo."
            fi
            if command -v wg >/dev/null 2>&1; then
              echo "wg show (may need sudo):"
              echo '```'
              wg show 2>&1
              echo '```'
            else
              echo "wg binary not in PATH."
            fi
            echo "WireGuard interfaces (ip link):"
            echo '```'
            ip -br link show type wireguard 2>&1
            echo '```'

            echo "### Xray"
            for p in /usr/local/etc/xray /etc/xray; do
              if [ -d "$p" ]; then
                echo "$p contents:"
                echo '```'
                ls -la "$p" 2>&1
                echo '```'
              fi
            done
            echo "systemctl status xray:"
            echo '```'
            systemctl status xray --no-pager 2>&1 | head -20
            echo '```'

            echo "### vk-turn-proxy (existing install, if any)"
            echo '```'
            ls -la /opt/vk-turn-proxy/ 2>&1
            ls -la /etc/vk-turn-proxy/ 2>&1
            systemctl list-units 'vk-turn-proxy@*' --all --no-legend --no-pager 2>&1
            echo '```'

            echo "### Public IP"
            echo '```'
            curl -fsS --max-time 3 https://api.ipify.org 2>&1; echo
            echo '```'

            echo "### Sudo capabilities (sudo -n -l)"
            echo '```'
            sudo -n -l 2>&1
            echo '```'

            echo "### Sudo: read WireGuard ListenPort"
            echo '```'
            sudo -n bash -c 'grep -hE "^\s*ListenPort" /etc/wireguard/*.conf 2>&1 | head -5' 2>&1
            echo '```'

            echo "### Sudo: wg show"
            echo '```'
            sudo -n wg show 2>&1 | head -30
            echo '```'

            echo "### bootstrap.sh --dry-run (via sudo -n)"
            echo '```'
            sudo -n bash ./scripts/bootstrap.sh --dry-run 2>&1
            rc=$?
            echo ""
            echo "(bootstrap.sh --dry-run exit: $rc)"
            echo '```'
          } >> "$OUT"

          # Mirror to the per-step UI summary too.
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"

          echo "Wrote $(wc -c < "$OUT") bytes to $OUT"

      - name: Commit and push _inventory/latest.md
        shell: bash
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name  "github-actions[bot]"
          git add _inventory/latest.md
          if git diff --cached --quiet; then
            echo "Inventory unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "inventory: refresh latest.md from runner $(hostname)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
