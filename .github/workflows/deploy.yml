name: Deploy

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'tcputil/**'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on self-hosted runner
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'
          cache: true

      - name: Build server binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w -checklinkname=0" -trimpath \
            -o dist/server ./server
          ls -la dist/server

      - name: Deploy to host
        run: ./scripts/deploy.sh dist/server

      - name: Verify enabled instances are active
        run: |
          sleep 3
          fail=0
          found=0
          for instance in udp vless; do
            unit="vk-turn-proxy@${instance}.service"
            if sudo /bin/systemctl is-enabled "$unit" >/dev/null 2>&1; then
              found=$((found + 1))
              echo "::group::status $unit"
              sudo /bin/systemctl --no-pager --lines=30 status "$unit" || true
              echo "::endgroup::"
              if ! sudo /bin/systemctl is-active "$unit" >/dev/null 2>&1; then
                echo "::error::$unit is not active after deploy"
                fail=1
              fi
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::warning::No enabled vk-turn-proxy@* instance found on this host."
          fi
          exit "$fail"
