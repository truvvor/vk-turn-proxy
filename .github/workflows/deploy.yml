name: Deploy

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'tcputil/**'
      - 'captcha-service/**'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on self-hosted runner
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'
          cache: true

      - name: Bootstrap host (idempotent)
        # First-time setup: detect WireGuard / Xray, write env files,
        # enable systemd units. After the initial run install.sh leaves
        # existing /etc/vk-turn-proxy/*.env files alone, so this becomes
        # a no-op on subsequent deploys.
        run: sudo -n bash ./scripts/bootstrap.sh

      - name: Build server binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w -checklinkname=0" -trimpath \
            -o dist/server ./server
          ls -la dist/server

      - name: Build captcha-service binary
        # captcha-service has its own go.mod, so the build runs from inside
        # that directory. CGO off + static linking matches the server binary
        # so we don't depend on glibc versions on the runtime host.
        working-directory: ./captcha-service
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -trimpath \
            -o "$GITHUB_WORKSPACE/dist/captcha-service" .
          ls -la "$GITHUB_WORKSPACE/dist/captcha-service"

      - name: Deploy to host
        run: ./scripts/deploy.sh dist/server dist/captcha-service

      - name: Verify enabled instances are active
        id: verify
        run: |
          sleep 3
          fail=0
          found=0
          failed_units=""

          check_unit() {
            local unit="$1"
            if ! sudo systemctl is-enabled "$unit" >/dev/null 2>&1; then
              return
            fi
            found=$((found + 1))
            echo "::group::status $unit"
            sudo systemctl --no-pager --lines=30 status "$unit" || true
            echo "::endgroup::"
            if ! sudo systemctl is-active "$unit" >/dev/null 2>&1; then
              echo "::error::$unit is not active after deploy"
              failed_units="${failed_units} ${unit}"
              fail=1
            fi
          }

          for instance in udp vless; do
            check_unit "vk-turn-proxy@${instance}.service"
          done
          check_unit "captcha-service.service"

          if [ "$found" -eq 0 ]; then
            echo "::error::No enabled unit found on this host (vk-turn-proxy@* / captcha-service)."
            fail=1
          fi
          echo "failed_units=${failed_units# }" >> "$GITHUB_OUTPUT"
          exit "$fail"

      - name: Diagnostics on verify failure
        if: failure() && steps.verify.outputs.failed_units != ''
        run: |
          set +e
          for unit in ${{ steps.verify.outputs.failed_units }}; do
            case "$unit" in
              vk-turn-proxy@*.service)
                instance="${unit#vk-turn-proxy@}"; instance="${instance%.service}"
                env_file="/etc/vk-turn-proxy/${instance}.env"
                ;;
              captcha-service.service)
                env_file="/etc/vk-turn-proxy/captcha-service.env"
                ;;
              *)
                env_file=""
                ;;
            esac

            echo "::group::journalctl -u $unit (last 80 lines)"
            sudo journalctl -u "$unit" -n 80 --no-pager
            echo "::endgroup::"

            if [ -n "$env_file" ]; then
              echo "::group::env file: $env_file"
              # Mask API_KEY value so it doesn't end up in public Actions logs.
              sudo sed 's/^API_KEY=.*/API_KEY=<masked>/' "$env_file" 2>&1
              echo "::endgroup::"
            fi

            echo "::group::systemctl show $unit"
            sudo systemctl show "$unit" --no-pager \
                -p ActiveState,SubState,Result,ExecMainStatus,ExecMainCode,LoadState,UnitFileState,Restart
            echo "::endgroup::"
          done

          echo "::group::ss -ulnp / -tlnp (listeners)"
          sudo ss -ulnp
          sudo ss -tlnp
          echo "::endgroup::"

          echo "::group::ip link / wg interfaces"
          ip -br link
          sudo wg show 2>&1 || true
          echo "::endgroup::"

          echo "::group::/opt/vk-turn-proxy"
          sudo ls -la /opt/vk-turn-proxy/
          file /opt/vk-turn-proxy/server 2>&1 || true
          file /opt/vk-turn-proxy/captcha-service 2>&1 || true
          echo "::endgroup::"
          exit 1

      - name: Print connection URL
        if: success()
        run: |
          PUBLIC_IP="$(curl -fsS --max-time 3 https://api.ipify.org 2>/dev/null || echo '<server-ip>')"
          {
            echo "## Active vk-turn-proxy endpoints"
            echo ""
            for instance in udp vless; do
              unit="vk-turn-proxy@${instance}.service"
              env_file="/etc/vk-turn-proxy/${instance}.env"
              if sudo systemctl is-active "$unit" >/dev/null 2>&1 && sudo test -r "$env_file"; then
                listen=$(sudo grep '^LISTEN=' "$env_file" | cut -d= -f2)
                connect=$(sudo grep '^CONNECT=' "$env_file" | cut -d= -f2)
                port="${listen##*:}"
                echo "- **${instance}**: \`${PUBLIC_IP}:${port}\` (proxies to \`${connect}\`)"
              fi
            done

            if sudo systemctl is-active captcha-service.service >/dev/null 2>&1 \
                && sudo test -r /etc/vk-turn-proxy/captcha-service.env; then
              listen=$(sudo grep '^LISTEN_ADDR=' /etc/vk-turn-proxy/captcha-service.env | cut -d= -f2)
              port="${listen##*:}"
              echo ""
              echo "## captcha-service"
              echo ""
              echo "- URL: \`http://${PUBLIC_IP}:${port}\`"
              echo "- API key: (printed only on the server, **not in logs**) — run:"
              echo "  \`\`\`"
              echo "  sudo grep API_KEY /etc/vk-turn-proxy/captcha-service.env"
              echo "  \`\`\`"
              echo "- Healthcheck: \`curl http://${PUBLIC_IP}:${port}/healthz\` → \`ok\`"
              echo "- Open TCP/${port} in the cloud firewall so the iOS client can reach it."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
