version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - misspell
    - revive
  settings:
    errcheck:
      # Type assertions return (T, bool), not (T, error); we already use
      # the `, _` pattern in lots of places to mean "treat missing as
      # zero value". check-blank=true conflates that with discarding an
      # actual error, so keep it off.
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (net.PacketConn).WriteTo
        - (net.Conn).Write
        - encoding/json.MarshalIndent
        - (*github.com/pion/dtls/v3.Conn).SetDeadline
    govet:
      disable:
        - fieldalignment
      enable-all: true
    revive:
      rules:
        - name: blank-imports
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    # v2 location for what used to live under issues.exclude-rules.
    rules:
      - linters:
          - errcheck
        source: "doRequest|packetPool\\.Get"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
